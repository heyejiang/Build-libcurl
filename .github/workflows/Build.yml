name: Build libcurl with CMake

on:
  workflow_dispatch:
    inputs:
      curl_version:
        description: 'Curl version tag (e.g., curl-8_6_0)'
        required: true
        default: 'master'
        type: string
      build_type:
        description: 'Build type: shared (DLL) or static (LIB)'
        required: true
        default: 'shared'
        type: choice
        options:
          - shared
          - static

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64]

    steps:
      - name: Checkout curl source
        uses: actions/checkout@v4
        with:
          repository: curl/curl
          ref: ${{ github.event.inputs.curl_version }}

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install static dependencies via vcpkg
        shell: pwsh
        run: |
          vcpkg install openssl c-ares zlib libssh2 nghttp2 msh3 --triplet x64-windows-static-md

      - name: Configure CMake for ${{ github.event.inputs.build_type }} build
        shell: pwsh
        run: |
          $shared = "${{ github.event.inputs.build_type }}" -eq "shared"
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="x64-windows-static-md" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=$(if ($shared) { "ON" } else { "OFF" }) `
            -DCURL_USE_OPENSSL=ON `
            -DENABLE_ARES=ON `
            -DCURL_ZLIB=ON `
            -DCURL_USE_LIBSSH2=ON `
            -DENABLE_IPV6=ON `
            -DUSE_WINDOWS_SSPI=ON `
            -DUSE_NGHTTP2=ON `
            -DUSE_MSH3=ON `
            -DCURL_USE_LIBPSL=OFF

      - name: Build libcurl
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Collect and Package Artifacts
        shell: pwsh
        run: |
          $buildType = "${{ github.event.inputs.build_type }}"
          $typeSuffix = if ($buildType -eq "shared") { "dll" } else { "static" }
          $dir = "libcurl-vc18-x64-release-$typeSuffix-ssl-static-cares-static-zlib-static-ssh2-static-ipv6-sspi-nghttp2-static-msh3-static"
          New-Item -ItemType Directory -Path $dir -Force
          New-Item -ItemType Directory -Path "$dir\bin" -Force
          New-Item -ItemType Directory -Path "$dir\lib" -Force
          New-Item -ItemType Directory -Path "$dir\include" -Force

          # Copy DLLs (only for shared build)
          if ($buildType -eq "shared") {
            Copy-Item -Path "build\lib\Release\*.dll" -Destination "$dir\bin\" -Force
          }

          # Copy import/static libs from curl build
          Copy-Item -Path "build\lib\Release\*.lib" -Destination "$dir\lib\" -Force

          # Rename import lib for clarity (shared only)
          if ($buildType -eq "shared" -and (Test-Path "$dir\lib\libcurl.lib")) {
            Rename-Item -Path "$dir\lib\libcurl.lib" -NewName "libcurl_imp.lib"
          }

          # Copy headers
          Copy-Item -Path "include\curl\*" -Destination "$dir\include\" -Recurse -Force

          # Copy dependency static libs only for static build
          if ($buildType -eq "static") {
            $vcpkg_libs = "$env:VCPKG_INSTALLATION_ROOT\packages"
            $deps = @("openssl", "zlib", "libssh2", "nghttp2", "c-ares", "msh3")
            foreach ($lib in $deps) {
                $src = "$vcpkg_libs\${lib}_x64-windows-static-md\lib"
                if (Test-Path $src) {
                    Copy-Item -Path "$src\*.lib" -Destination "$dir\lib\" -Force
                }
            }
          }

          # Generate README according to build type
          if ($buildType -eq "shared") {
            $ReadmeContent = @"
            ## Required System Libraries (DLL build)
            When linking dynamically to `libcurl_imp.lib`, you must link:
            - crypt32.lib
            - ws2_32.lib
            - wldap32.lib
            - advapi32.lib
            - bcrypt.lib
            - user32.lib
            
            No additional static libraries from vcpkg are needed; they are already linked into `libcurl.dll`.
            "@
                      } else {
                        $ReadmeContent = @"
            ## Required Libraries (Static build)
            When linking statically to `libcurl.lib`, you must also link all dependency static libraries (order matters):
            - libcurl.lib
            - libssl.lib
            - libcrypto.lib
            - zlib.lib
            - libssh2.lib
            - nghttp2.lib
            - cares.lib
            - msh3.lib
            - crypt32.lib
            - ws2_32.lib
            - wldap32.lib
            - advapi32.lib
            - bcrypt.lib
            - user32.lib
            "@
          }
          Out-File -FilePath "$dir\README.md" -InputObject $ReadmeContent -Encoding UTF8

          # Create zip archive
          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip" -Force

          # Set environment variable for later steps
          echo "PACKAGE_DIR=$dir" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcurl-vc18-x64-${{ github.event.inputs.build_type }}-build
          path: ${{ env.PACKAGE_DIR }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libcurl-${{ github.event.inputs.curl_version }}-${{ github.event.inputs.build_type }}-${{ github.run_id }}
          name: libcurl ${{ github.event.inputs.curl_version }} (${{ github.event.inputs.build_type }}, x64) - Build ${{ github.run_id }}
          prerelease: ${{ contains(github.event.inputs.curl_version, 'master') }}
          draft: false
          body_path: ${{ env.PACKAGE_DIR }}/README.md
          files: |
            ${{ env.PACKAGE_DIR }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
