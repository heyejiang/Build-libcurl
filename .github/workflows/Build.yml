name: Build libcurl with CMake (Shared + Static)

on:
  workflow_dispatch:
    inputs:
      curl_version:
        description: 'Curl version tag (e.g., curl-8_6_0)'
        required: true
        default: 'master'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
        build_type: [shared, static]   # 同时构建两种类型

    steps:
      - name: Checkout curl source
        uses: actions/checkout@v4
        with:
          repository: curl/curl
          ref: ${{ github.event.inputs.curl_version }}

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install static dependencies via vcpkg
        shell: pwsh
        run: |
          vcpkg install openssl c-ares zlib libssh2 nghttp2 msh3 --triplet x64-windows-static-md

      - name: Configure CMake for ${{ matrix.build_type }} build
        shell: pwsh
        run: |
          $shared = "${{ matrix.build_type }}" -eq "shared"
          $shared_flag = if ($shared) { "ON" } else { "OFF" }
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="x64-windows-static-md" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=$shared_flag `
            -DCURL_USE_OPENSSL=ON `
            -DENABLE_ARES=ON `
            -DCURL_ZLIB=ON `
            -DCURL_USE_LIBSSH2=ON `
            -DENABLE_IPV6=ON `
            -DUSE_WINDOWS_SSPI=ON `
            -DUSE_NGHTTP2=ON `
            -DUSE_MSH3=ON `
            -DCURL_USE_LIBPSL=OFF

      - name: Build libcurl
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Collect and Package Artifacts
        shell: pwsh
        run: |
          $buildType = "${{ matrix.build_type }}"
          $typeSuffix = if ($buildType -eq "shared") { "dll" } else { "static" }
          $dir = "libcurl-vc18-x64-release-$typeSuffix-ssl-static-cares-static-zlib-static-ssh2-static-ipv6-sspi-nghttp2-static-msh3-static"
          New-Item -ItemType Directory -Path $dir -Force
          New-Item -ItemType Directory -Path "$dir\bin" -Force
          New-Item -ItemType Directory -Path "$dir\lib" -Force
          New-Item -ItemType Directory -Path "$dir\include" -Force

          # Copy DLLs (only for shared build)
          if ($buildType -eq "shared") {
            Copy-Item -Path "build\lib\Release\*.dll" -Destination "$dir\bin\" -Force
          }

          # Copy import/static libs from curl build
          Copy-Item -Path "build\lib\Release\*.lib" -Destination "$dir\lib\" -Force

          # Rename import lib for clarity (shared only)
          if ($buildType -eq "shared" -and (Test-Path "$dir\lib\libcurl.lib")) {
            Rename-Item -Path "$dir\lib\libcurl.lib" -NewName "libcurl_imp.lib"
          }

          # Copy headers
          Copy-Item -Path "include\curl\*" -Destination "$dir\include\" -Recurse -Force

          # Copy dependency static libs only for static build
          if ($buildType -eq "static") {
            $vcpkg_libs = "$env:VCPKG_INSTALLATION_ROOT\packages"
            $deps = @("openssl", "zlib", "libssh2", "nghttp2", "c-ares", "msh3")
            foreach ($lib in $deps) {
                $src = "$vcpkg_libs\${lib}_x64-windows-static-md\lib"
                if (Test-Path $src) {
                    Copy-Item -Path "$src\*.lib" -Destination "$dir\lib\" -Force
                }
            }
          }

          # Generate README according to build type
          if ($buildType -eq "shared") {
            $ReadmeContent = @"
            ## Required System Libraries (DLL build)
            When linking dynamically to `libcurl_imp.lib`, you must link:
            - crypt32.lib
            - ws2_32.lib
            - wldap32.lib
            - advapi32.lib
            - bcrypt.lib
            - user32.lib
            
            No additional static libraries from vcpkg are needed; they are already linked into `libcurl.dll`.
            "@
          } else {
            $ReadmeContent = @"
            ## Required Libraries (Static build)
            When linking statically to `libcurl.lib`, you must also link all dependency static libraries (order matters):
            - libcurl.lib
            - libssl.lib
            - libcrypto.lib
            - zlib.lib
            - libssh2.lib
            - nghttp2.lib
            - cares.lib
            - msh3.lib
            - crypt32.lib
            - ws2_32.lib
            - wldap32.lib
            - advapi32.lib
            - bcrypt.lib
            - user32.lib
            "@
          }
          Out-File -FilePath "$dir\README.md" -InputObject $ReadmeContent -Encoding UTF8

          # Create zip archive
          $zipName = "$dir.zip"
          Compress-Archive -Path "$dir\*" -DestinationPath $zipName -Force

          # Set environment variable for artifact name
          echo "artifact_name=$zipName" >> $env:GITHUB_ENV

      - name: Upload Artifact (per build type)
        uses: actions/upload-artifact@v4
        with:
          name: libcurl-${{ matrix.build_type }}-${{ github.run_id }}
          path: ${{ env.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir release-assets
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libcurl-${{ github.event.inputs.curl_version }}-${{ github.run_id }}
          name: libcurl ${{ github.event.inputs.curl_version }} (x64, shared+static) - Build ${{ github.run_id }}
          prerelease: ${{ contains(github.event.inputs.curl_version, 'master') }}
          draft: false
          body: |
            This release contains both shared (DLL) and static (LIB) builds of libcurl for Windows x64.
            
            - **Shared build**: `libcurl.dll` + `libcurl_imp.lib` + headers
            - **Static build**: `libcurl.lib` + all dependency static libraries + headers
            
            See README inside each package for linking instructions.
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 检出仓库（默认分支）以更新 README.md
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # 自动更新 README.md：添加最新 Release 链接
      - name: Update README with latest release info
        shell: bash
        env:
          TAG_NAME: ${{ steps.create_release.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.create_release.outputs.name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_release.outputs.tag_name }}
        run: |
          python3 - <<EOF
          import re, os, datetime
          with open('README.md', 'r') as f:
              content = f.read()
          start = "<!-- LATEST_RELEASE_START -->"
          end = "<!-- LATEST_RELEASE_END -->"
          release_name = os.environ['RELEASE_NAME']
          release_url = os.environ['RELEASE_URL']
          date = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          new = f"{start}\n**Latest Release**: [{release_name}]({release_url}) - {date}\n{end}"
          pattern = re.compile(re.escape(start) + '.*?' + re.escape(end), re.DOTALL)
          if pattern.search(content):
              content = pattern.sub(new, content)
          else:
              content = new + '\n\n' + content
          with open('README.md', 'w') as f:
              f.write(content)
          EOF

          # 提交并推送更改
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update README with latest release $TAG_NAME"
          git push
