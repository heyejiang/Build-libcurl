name: Build libcurl with CMake

on: 
  workflow_dispatch: 
    inputs: 
      curl_version:
        description: 'Curl version tag (e.g., curl-8_6_0)'
        required: true
        default: 'master'
        type: string

jobs: 
  build: 
    runs-on: windows-latest
    
    strategy: 
      matrix: 
        arch: [x64]

    steps: 
      - name: Checkout curl source
        uses: actions/checkout@v4
        with:
          repository: curl/curl
          ref: ${{ github.event.inputs.curl_version }}

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with: 
          arch: ${{ matrix.arch }}

      - name: Install static dependencies via vcpkg
        shell: pwsh
        run: | 
          vcpkg install openssl c-ares zlib libssh2 nghttp2 msh3 --triplet x64-windows-static-md

      - name: Configure CMake for Mixed Linkage
        shell: pwsh
        run: | 
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="x64-windows-static-md" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DCURL_USE_OPENSSL=ON `
            -DENABLE_ARES=ON `
            -DCURL_ZLIB=ON `
            -DCURL_USE_LIBSSH2=ON `
            -DENABLE_IPV6=ON `
            -DUSE_WINDOWS_SSPI=ON `
            -DUSE_NGHTTP2=ON `
            -DUSE_MSH3=ON `
            -DCURL_USE_LIBPSL=OFF           # 禁用 libpsl（未安装）

      - name: Build libcurl
        shell: pwsh
        run: | 
          cmake --build build --config Release --parallel

      - name: Collect and Package Artifacts
        shell: pwsh
        run: | 
          $dir = "libcurl-vc18-x64-release-dll-ssl-static-cares-static-zlib-static-ssh2-static-ipv6-sspi-nghttp2-static-msh3-static"
          New-Item -ItemType Directory -Path $dir -Force
          New-Item -ItemType Directory -Path "$dir\bin" -Force
          New-Item -ItemType Directory -Path "$dir\lib" -Force
          New-Item -ItemType Directory -Path "$dir\include" -Force

          Copy-Item -Path "build\lib\Release\*.dll" -Destination "$dir\bin\" -Force
          Copy-Item -Path "build\lib\Release\*.lib" -Destination "$dir\lib\" -Force
          
          if (Test-Path "$dir\lib\libcurl.lib") {
            Rename-Item -Path "$dir\lib\libcurl.lib" -NewName "libcurl_imp.lib"
          }

          Copy-Item -Path "include\curl\*" -Destination "$dir\include\" -Recurse -Force

          $vcpkg_libs = "$env:VCPKG_INSTALLATION_ROOT\packages"
          $deps = @("openssl", "zlib", "libssh2", "nghttp2", "c-ares", "msh3")
          foreach ($lib in $deps) {
              $src = "$vcpkg_libs\${lib}_x64-windows-static-md\lib"
              if (Test-Path $src) {
                  Copy-Item -Path "$src\*.lib" -Destination "$dir\lib\" -Force
              }
          }

          $ReadmeContent = @"
          ## Required System Libraries
          When linking dynamically to libcurl_imp.lib, you must link:
          - crypt32.lib
          - ws2_32.lib
          - wldap32.lib
          - advapi32.lib
          - bcrypt.lib
          - user32.lib
          "@
          Out-File -FilePath "$dir\README.md" -InputObject $ReadmeContent -Encoding UTF8

          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: libcurl-vc18-x64-mixed-build
          path: libcurl-vc18-x64-release-dll-ssl-static-cares-static-zlib-static-ssh2-static-ipv6-sspi-nghttp2-static-msh3-static.zip
